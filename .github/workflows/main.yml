name: Screenshot Archiver

on:
  push:
    branches:
      - main

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Archive URLs
        continue-on-error: true
        run: |
          cat > archiver.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');

          function makeSafeName(url) {
            return url.replace(/^https?:\/\//, '').replace(/[^a-z0-9]+/gi, '_').substring(0, 100);
          }

          function toAbsoluteUrl(value, baseUrl) {
            try {
              return new URL(value, baseUrl).href;
            } catch {
              return value;
            }
          }

          function buildOfflineHtml(html, finalUrl) {
            let doc = html;
            
            doc = doc.replace(/<head>/i, `<head>\n<base href="${finalUrl}">`);
            
            doc = doc.replace(/<(img|picture|source|video|audio|canvas)[^>]*>/gi, '');
            doc = doc.replace(/<svg[\s\S]*?<\/svg>/gi, '');
            doc = doc.replace(/<(script|noscript)[^>]*>[\s\S]*?<\/\1>/gi, '');
            doc = doc.replace(/<link[^>]*(preload|prefetch|dns-prefetch|preconnect)[^>]*>/gi, '');
            
            return doc;
          }

          async function autoScroll(page) {
            await page.evaluate(async () => {
              await new Promise((resolve) => {
                let totalHeight = 0;
                const distance = 100;
                const timer = setInterval(() => {
                  const scrollHeight = document.body.scrollHeight;
                  window.scrollBy(0, distance);
                  totalHeight += distance;
                  if (totalHeight >= scrollHeight) {
                    clearInterval(timer);
                    resolve();
                  }
                }, 100);
              });
            });
          }

          (async () => {
            const url = process.argv[2];
            if (!url) {
              console.error('No URL provided');
              process.exit(1);
            }

            console.log(`Processing: ${url}`);
            const browser = await chromium.launch({ headless: true });
            
            try {
              const context = await browser.newContext({
                viewport: { width: 1280, height: 720 },
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              });
              const page = await context.newPage();

              console.log(`Navigating to ${url}...`);
              const response = await page.goto(url, { waitUntil: 'load', timeout: 60000 });
              
              if (!response || !response.ok()) {
                throw new Error(`Failed to load ${url}: ${response?.status()}`);
              }

              await page.waitForTimeout(5000);
              await autoScroll(page);
              await page.waitForTimeout(2000);

              const finalUrl = page.url();
              console.log(`Final URL: ${finalUrl}`);

              const html = await page.content();
              const offlineHtml = buildOfflineHtml(html, finalUrl);

              const safeName = makeSafeName(finalUrl);
              const dir = 'downloads';
              if (!fs.existsSync(dir)) {
                fs.mkdirSync(dir, { recursive: true });
              }

              const htmlPath = path.join(dir, `${safeName}.html`);
              fs.writeFileSync(htmlPath, offlineHtml, 'utf8');
              console.log(`Saved HTML: ${htmlPath}`);

              const screenshotPath = path.join(dir, `${safeName}.png`);
              await page.screenshot({ path: screenshotPath, fullPage: true });
              console.log(`Saved screenshot: ${screenshotPath}`);

              console.log(`Successfully archived: ${url}`);

            } catch (err) {
              console.error(`Error processing ${url}:`, err);
              // Don't set exit code - allow workflow to continue
              // process.exitCode = 1;
            } finally {
              await browser.close();
            }
          })();
          EOF

          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if echo "$COMMIT_MSG" | grep -q "\[skip ci\]"; then
            echo "Skipping archiver (found [skip ci])"
            exit 0
          fi

          URLS=$(echo "$COMMIT_MSG" | grep -Eo "https?://[^[:space:]\"'<>]+")
          
          if [ -z "$URLS" ]; then
            echo "No URLs found in commit message"
            exit 0
          fi

          echo "Found URLs:"
          echo "$URLS"

          for URL in $URLS; do
            node archiver.js "$URL"
          done

          rm -f archiver.js

      - name: Split large files
        continue-on-error: true
        run: |
          if [ -d downloads ]; then
            for file in downloads/*; do
              if [ -f "$file" ]; then
                SIZE=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
                if [ "$SIZE" -gt 94371840 ]; then
                  echo "Splitting $file (size: $SIZE bytes)"
                  split -b 90M "$file" "${file}.part_"
                  rm "$file"
                fi
              fi
            done
          fi

      - name: Commit and push
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Archive screenshots [skip ci]" || echo "No changes to commit"
          git push
