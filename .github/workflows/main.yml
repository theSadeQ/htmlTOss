name: Screenshot Archiver

on:
  push:
    branches:
      - main

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright and Dependencies
        run: |
          npm init -y
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install --with-deps chromium

      - name: Create Archiver Script
        run: |
          cat << 'EOF' > archiver.js
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();

          chromium.use(stealth);

          function makeSafeName(url) {
            const base = url
              .replace(/^https?:\/\//i, '')
              .replace(/[^a-z0-9]+/gi, '_')
              .replace(/^_+|_+$/g, '')
              .toLowerCase()
              .slice(0, 80);

            const hash = crypto.createHash('sha1').update(url).digest('hex').slice(0, 10);
            return `${base || 'url'}_${hash}`;
          }

          (async () => {
            const url = process.argv[2];

            if (!url) {
              console.error('No URL provided.');
              process.exit(1);
            }

            const safeName = makeSafeName(url);
            const outputDir = 'downloads';

            const screenshotPath = path.join(outputDir, `${safeName}.png`);
            const htmlPath = path.join(outputDir, `${safeName}.html`);
            const metadataPath = path.join(outputDir, `${safeName}.json`);

            fs.mkdirSync(outputDir, { recursive: true });

            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const page = await browser.newPage();
            await page.setViewportSize({ width: 1920, height: 1080 });

            try {
              console.log(`Navigating to ${url}...`);
              await page.goto(url, {
                waitUntil: 'load',
                timeout: 60000
              });

              console.log('Waiting for redirects/challenges...');
              await page.waitForTimeout(5000);

              console.log('Scrolling page to trigger lazy-loaded content...');
              await page.evaluate(async () => {
                await new Promise((resolve) => {
                  let totalHeight = 0;
                  const distance = 400;
                  const timer = setInterval(() => {
                    const scrollHeight = Math.max(
                      document.body.scrollHeight,
                      document.documentElement.scrollHeight
                    );

                    window.scrollBy(0, distance);
                    totalHeight += distance;

                    if (totalHeight >= scrollHeight) {
                      clearInterval(timer);
                      resolve();
                    }
                  }, 150);
                });
              });

              console.log('Waiting for final rendering...');
              await page.waitForTimeout(2000);

              const title = await page.title().catch(() => '');
              const finalUrl = page.url();

              console.log(`Saving screenshot: ${screenshotPath}`);
              await page.screenshot({
                path: screenshotPath,
                fullPage: true
              });

              console.log(`Saving matching HTML: ${htmlPath}`);
              const htmlContent = await page.content();
              fs.writeFileSync(htmlPath, htmlContent, 'utf8');

              const metadata = {
                originalUrl: url,
                finalUrl,
                safeName,
                screenshotFile: `${safeName}.png`,
                htmlFile: `${safeName}.html`,
                title,
                capturedAt: new Date().toISOString()
              };

              console.log(`Saving metadata: ${metadataPath}`);
              fs.writeFileSync(metadataPath, JSON.stringify(metadata, null, 2), 'utf8');

              console.log(`Done: ${url}`);
            } catch (err) {
              console.error(`Error processing ${url}:`, err);
              process.exitCode = 1;
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Extract URLs and Capture Screenshots
        run: |
          mkdir -p downloads

          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]]; then
            echo "Skipping CI to prevent infinite loop."
            exit 0
          fi

          URLS=$(echo "$COMMIT_MSG" | grep -Eo 'https?://[^[:space:]"'\''<>]+' || true)

          if [ -z "$URLS" ]; then
            echo "No URLs found in the commit message."
          else
            for URL in $URLS; do
              echo "Processing: $URL"
              node archiver.js "$URL"
            done
          fi

      - name: Split Large Files (> 90MB)
        run: |
          cd downloads
          for file in *; do
            if [ -f "$file" ]; then
              filesize=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
              if [ "$filesize" -gt 94371840 ]; then
                echo "Splitting $file because it's larger than 90MB..."
                zip -s 90m "${file}.zip" "$file"
                rm "$file"
              fi
            fi
          done
          cd ..

      - name: Cleanup temporary files
        run: |
          rm -f archiver.js
          rm -f package.json package-lock.json
          rm -rf node_modules

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add screenshots + matching HTML + metadata [skip ci]"
            git push
          fi
