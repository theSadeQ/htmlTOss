name: Screenshot Archiver

on:
  push:
    branches:
      - main

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright@latest playwright-extra playwright-extra-plugin-stealth

      - name: Create archiver script
        run: |
          cat << 'EOF' > archiver.js
          const fs = require('fs/promises');
          const { chromium } = require('playwright-extra');
          const StealthPlugin = require('playwright-extra-plugin-stealth');

          chromium.use(StealthPlugin());

          // Sanitize a string to be safe for use as a filename
          function sanitizeFilename(name) {
            return name
              .replace(/[^a-z0-9]/gi, '_') // replace non-alphanumerics
              .replace(/_+/g, '_')         // collapse multiple underscores
              .toLowerCase()
              .slice(0, 200);              // avoid extremely long filenames
          }

          async function archive(url) {
            const browser = await chromium.launch({
              headless: true
            });

            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 }
            });

            const page = await context.newPage();

            // Derive a safe base name from the URL
            const safeName = sanitizeFilename(url);
            const outputDir = 'downloads';
            const screenshotPath = `${outputDir}/${safeName}.png`;
            const linksPath = `${outputDir}/${safeName}.links.txt`;

            await fs.mkdir(outputDir, { recursive: true });

            try {
              console.log(`Navigating to: ${url}`);
              await page.goto(url, {
                waitUntil: 'networkidle',
                timeout: 60000
              });

              // Wait a bit for possible redirects / JS
              await page.waitForTimeout(5000);

              // Scroll to trigger lazy loading
              await autoScroll(page);

              // Take full page screenshot
              await page.screenshot({
                path: screenshotPath,
                fullPage: true
              });
              console.log(`Saved screenshot to ${screenshotPath}`);

              // === NEW: Extract and store links ===
              // 1. Collect raw href values from the page
              const rawLinks = await page.$$eval('a[href]', anchors =>
                anchors
                  .map(a => a.getAttribute('href'))
                  .filter(Boolean)
              );

              const pageUrl = page.url();

              // 2. Normalize to absolute URLs, remove invalids and duplicates
              const absoluteLinks = [...new Set(
                rawLinks
                  .map(href => {
                    try {
                      return new URL(href, pageUrl).href;
                    } catch {
                      return null;
                    }
                  })
                  .filter(Boolean)
              )];

              // 3. Save them as a simple newline-separated text file
              await fs.writeFile(
                linksPath,
                absoluteLinks.join('\n'),
                'utf8'
              );

              console.log(
                `Saved ${absoluteLinks.length} links to ${linksPath}`
              );
              // === END NEW CODE ===

            } catch (error) {
              console.error(`Error archiving ${url}:`, error);
            } finally {
              await browser.close();
            }
          }

          async function autoScroll(page) {
            await page.evaluate(async () => {
              await new Promise((resolve) => {
                let totalHeight = 0;
                const distance = 400;
                const timer = setInterval(() => {
                  const { scrollHeight } = document.scrollingElement || document.body;
                  window.scrollBy(0, distance);
                  totalHeight += distance;

                  if (totalHeight >= scrollHeight) {
                    clearInterval(timer);
                    resolve();
                  }
                }, 300);
              });
            });
          }

          // Read URL from command line
          const url = process.argv[2];
          if (!url) {
            console.error('Usage: node archiver.js <url>');
            process.exit(1);
          }

          archive(url).catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Extract URLs from commit message
        id: extract_urls
        run: |
          set +e  # prevent step failure on no matches

          LAST_COMMIT_MSG="$(git log -1 --pretty=%B)"
          echo "Last commit message: $LAST_COMMIT_MSG"

          # Extract any URLs (http or https), allow empty result
          URLS=$(echo "$LAST_COMMIT_MSG" | grep -Eo '(http|https)://[^ ]+' || true)

          if [ -z "$URLS" ]; then
            echo "⚠️ No URLs found in commit message."
          else
            echo "✅ Extracted URLs:"
            echo "$URLS"
          fi

          echo "$URLS" > urls.txt

          set -e  # resume normal error handling

      - name: Run archiver for each URL
        if: success()
        run: |
          if [ ! -s urls.txt ]; then
            echo "No URLs found in commit message. Skipping archiver."
            exit 0
          fi

          mkdir -p downloads

          while IFS= read -r url; do
            if [ -z "$url" ]; then
              continue
            fi
            echo "Archiving URL: $url"
            node archiver.js "$url"
          done < urls.txt

      # Optional: Split large files in downloads/ directory (e.g., >90MB)
      - name: Split large files
        run: |
          mkdir -p temp_splits
          for file in downloads/*; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file")
              # ~90MB threshold (90 * 1024 * 1024)
              if [ "$size" -gt 94371840 ]; then
                echo "Splitting large file: $file"
                base=$(basename "$file")
                split -b 90M "$file" "temp_splits/${base}.part-"
                rm "$file"
              fi
            fi
          done

          # Move split parts back into downloads
          if ls temp_splits/* 1> /dev/null 2>&1; then
            mv temp_splits/* downloads/
          fi

      - name: Clean up temp files
        run: |
          rm -rf temp_splits
          rm -f urls.txt

      - name: Commit and push changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add archived screenshots and links [skip ci]"
          git push
